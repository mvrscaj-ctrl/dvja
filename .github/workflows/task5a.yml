name: SBOM generation
on: 
  workflow_dispatch
jobs:
  create-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout of repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven
              
      - name: Build Maven project
        run: mvn -B clean package -DskipTest

      - name: Install Syft
        run: curl -sSfL https://get.anchore.io/syft | sudo sh -s -- -b /usr/local/bin

      - name: Building SBOM
        run: syft dir:. -o cyclonedx-json > dvja-sbom.json

      - name: Install Grype (vulnerability scanner)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan SBOM with Grype
        run: |
          # grype can consume an SBOM file directly; output JSON so it can be consumed later
          grype sbom:dvja-sbom.json -o json > dvja-sbom-report.json || true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: dvja-sbom.json

      - name: Upload Grype scan report
        uses: actions/upload-artifact@v4
        with:
          name: grype-sbom-report
          path: dvja-sbom-report.json

  retrieve-report:
    needs: create-sbom
    runs-on: ubuntu-latest
    steps:
      - name: Download Grype report artifact
        uses: actions/download-artifact@v4
        with:
          name: grype-sbom-report
          path: report
      - name: Display Grype report
        run: |
          echo "Contents of downloaded SCA report:"
          cat report/dvja-sbom-report.json
